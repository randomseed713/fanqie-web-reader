name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # ===== STEP 0: Free disk/memory FIRST, before anything else =====
            echo "=== Initial disk ==="
            df -h /
            echo "=== Initial memory ==="
            free -h
            
            # Stop everything that might be using memory/disk
            docker compose -f /projects/fanqie-web-reader/docker-compose.yml down --remove-orphans 2>/dev/null || true
            docker system prune -af --volumes 2>/dev/null || true
            # Kill old unidbg if running
            if [ -f /opt/unidbg/unidbg.pid ]; then
              OLD_PID=$(cat /opt/unidbg/unidbg.pid)
              kill "$OLD_PID" 2>/dev/null || true
              rm -f /opt/unidbg/unidbg.pid
            fi
            # Clean temp files
            rm -rf /tmp/unidbg_* /tmp/hsperfdata_* 2>/dev/null || true
            apt-get clean 2>/dev/null || true
            
            # Ensure swap
            if ! swapon --show | grep -q /swapfile; then
              if [ ! -f /swapfile ]; then
                echo "Creating 1GB swap..."
                dd if=/dev/zero of=/swapfile bs=1M count=1024
                chmod 600 /swapfile
                mkswap /swapfile
              fi
              swapon /swapfile
            fi
            
            echo "=== After cleanup ==="
            df -h /
            free -h
            
            # ===== STEP 1: Pull code (now there's space) =====
            cd /projects/fanqie-web-reader
            git fetch origin main
            git reset --hard origin/main
            echo "Current commit: $(git rev-parse --short HEAD)"
            
            # ===== STEP 2: Install JRE =====
            export DEBIAN_FRONTEND=noninteractive
            if ! command -v java &>/dev/null; then
              echo "Installing JRE..."
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends default-jre-headless curl libstdc++6
            fi
            JAVA_BIN=$(which java)
            echo "Java: $($JAVA_BIN -version 2>&1 | head -1)"
            
            # ===== STEP 3: Prepare unidbg =====
            UNIDBG_DIR=/opt/unidbg
            UNIDBG_JAR="$UNIDBG_DIR/unidbg-boot-server.jar"
            PID_FILE="$UNIDBG_DIR/unidbg.pid"
            JAR_URL="https://github.com/mtongle/fqnovel-unidbg/releases/download/v0.0.4/unidbg-boot-server-0.0.4.jar"
            mkdir -p "$UNIDBG_DIR"
            
            if [ ! -f "$UNIDBG_JAR" ]; then
              echo "Downloading unidbg JAR..."
              curl -fL --retry 3 -o "$UNIDBG_JAR" "$JAR_URL"
              echo "JAR size: $(ls -lh $UNIDBG_JAR | awk '{print $5}')"
            else
              echo "unidbg JAR exists ($(ls -lh $UNIDBG_JAR | awk '{print $5}'))"
            fi
            
            # Write unidbg config (connects to redis container on host network)
            printf 'server:\n  port: 8099\nspring:\n  redis:\n    host: 127.0.0.1\n    port: 6379\n    password: fanqie_unidbg_2026\n    timeout: 2000\n    lettuce:\n      pool:\n        max-active: 4\n        max-idle: 2\n        min-idle: 0\napplication:\n  unidbg:\n    dynarmic: false\n    verbose: false\n    async: false\nfq:\n  api:\n    base-url: https://api5-normal-sinfonlineb.fqnovel.com\n    device-pool:\n      enabled: true\n      size: 1\n' > "$UNIDBG_DIR/application.yml"
            
            # Clean up temp unidbg files from previous runs
            rm -rf /tmp/unidbg_* /tmp/jna*.tmp 2>/dev/null || true
            mkdir -p /opt/unidbg/tmp
            
            echo "=== Disk before unidbg start ==="
            df -h /
            echo "=== Memory before unidbg start ==="
            free -h
            
            # ===== STEP 3.5: Start Redis (for unidbg caching) =====
            cd /projects/fanqie-web-reader
            echo "Pulling Redis image..."
            docker compose pull redis
            echo "Starting Redis..."
            docker compose up -d redis
            # Wait for Redis to be ready
            for i in $(seq 1 10); do
              if docker exec fanqie-redis redis-cli -a fanqie_unidbg_2026 --no-auth-warning ping 2>/dev/null | grep -q PONG; then
                echo "Redis READY"
                break
              fi
              sleep 2
            done
            
            # ===== STEP 4: Start unidbg =====
            echo "Starting unidbg..."
            : > "$UNIDBG_DIR/unidbg.log"
            cd "$UNIDBG_DIR"
            setsid nohup "$JAVA_BIN" \
              -Xms64m -Xmx192m -XX:MaxMetaspaceSize=96m -XX:MaxDirectMemorySize=64m \
              -XX:+UseSerialGC -XX:ActiveProcessorCount=1 \
              -Djava.io.tmpdir=/opt/unidbg/tmp \
              -jar "$UNIDBG_JAR" \
              --spring.config.additional-location=file:"$UNIDBG_DIR"/ \
              > "$UNIDBG_DIR/unidbg.log" 2>&1 < /dev/null &
            UNIDBG_PID=$!
            echo $UNIDBG_PID > "$PID_FILE"
            echo "unidbg PID: $UNIDBG_PID"
            disown || true
            
            # Wait for unidbg
            echo "Waiting for unidbg to initialize..."
            UNIDBG_READY=0
            for i in $(seq 1 24); do
              sleep 10
              if ! kill -0 "$UNIDBG_PID" 2>/dev/null; then
                echo "!!! unidbg died !!!"
                tail -50 "$UNIDBG_DIR/unidbg.log"
                break
              fi
              CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 http://127.0.0.1:8099/api/fq-signature/test 2>/dev/null || echo "000")
              echo "unidbg check $i: HTTP $CODE (free: $(free -m | awk '/Mem:/{print $4}')M, disk: $(df -h / | awk 'NR==2{print $4}'))"
              if [ "$CODE" != "000" ] && [ "$CODE" != "502" ] && [ "$CODE" != "503" ]; then
                UNIDBG_READY=1
                break
              fi
            done
            
            if [ "$UNIDBG_READY" != "1" ]; then
              echo "!!! unidbg not ready !!!"
              tail -50 "$UNIDBG_DIR/unidbg.log"
              free -h
              df -h /
            else
              echo "unidbg READY!"
            fi
            
            # ===== STEP 5: Build & start web reader =====
            cd /projects/fanqie-web-reader
            echo "=== Disk before docker build ==="
            df -h /
            docker system prune -f 2>/dev/null || true
            
            echo "Building web reader..."
            docker compose build --no-cache fanqie-web-reader
            docker compose up -d
            
            sleep 8
            
            # ===== STEP 6: Verify =====
            echo "=== Final ==="
            docker compose ps
            curl -s -o /dev/null -w "Web reader HTTP %{http_code}\n" http://127.0.0.1:8199/ || echo "Web reader not ready"
            UNIDBG_FINAL=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 http://127.0.0.1:8099/api/fq-signature/test 2>/dev/null || echo "000")
            echo "Unidbg HTTP $UNIDBG_FINAL"
            free -h
            df -h /
            docker image prune -f
            echo "Deployment completed successfully!"
