name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /projects/fanqie-web-reader
            
            # Reset any local changes and pull latest code
            git fetch origin main
            git reset --hard origin/main
            echo "Current commit: $(git rev-parse --short HEAD)"
            
            # Free disk space aggressively (critical for 1C1G VPS)
            echo "=== Disk before cleanup ==="
            df -h /
            docker compose down --remove-orphans 2>/dev/null || true
            docker system prune -af --volumes
            echo "=== Disk after cleanup ==="
            df -h /
            
            # Build and start web reader
            echo "Building web reader..."
            docker compose build --no-cache fanqie-web-reader
            docker compose up -d fanqie-web-reader
            
            # --- Setup unidbg directly on host ---
            UNIDBG_DIR=/opt/unidbg
            JAVA_DIR=/opt/jdk11
            UNIDBG_JAR="$UNIDBG_DIR/unidbg-boot-server.jar"
            JAR_URL="https://github.com/mtongle/fqnovel-unidbg/releases/download/v0.0.4/unidbg-boot-server-0.0.4.jar"
            JRE_URL="https://github.com/adoptium/temurin11-binaries/releases/download/jdk-11.0.26%2B4/OpenJDK11U-jre_x64_linux_hotspot_11.0.26_4.tar.gz"
            
            mkdir -p "$UNIDBG_DIR"
            
            # Download JRE 11 if not present
            if [ ! -f "$JAVA_DIR/bin/java" ]; then
              echo "Downloading OpenJDK 11 JRE..."
              mkdir -p "$JAVA_DIR"
              curl -fsSL "$JRE_URL" | tar xz -C "$JAVA_DIR" --strip-components=1
              echo "JRE installed: $($JAVA_DIR/bin/java -version 2>&1 | head -1)"
            else
              echo "JRE already exists: $($JAVA_DIR/bin/java -version 2>&1 | head -1)"
            fi
            export PATH="$JAVA_DIR/bin:$PATH"
            
            # Install libstdc++ if missing (unidbg JNA needs it)
            if ! ldconfig -p | grep -q libstdc++; then
              echo "Installing libstdc++6..."
              apt-get update -qq && apt-get install -y -qq libstdc++6 curl 2>/dev/null || true
            fi
            
            # Download unidbg JAR if not present
            if [ ! -f "$UNIDBG_JAR" ]; then
              echo "Downloading unidbg JAR..."
              curl -fsSL -o "$UNIDBG_JAR" "$JAR_URL"
              echo "JAR size: $(ls -lh $UNIDBG_JAR | awk '{print $5}')"
            else
              echo "unidbg JAR exists ($(ls -lh $UNIDBG_JAR | awk '{print $5}'))"
            fi
            
            # Stop any existing unidbg process
            pkill -f "unidbg-boot-server" 2>/dev/null || true
            sleep 2
            
            # Start unidbg in background with memory limits
            echo "Starting unidbg..."
            cd "$UNIDBG_DIR"
            nohup "$JAVA_DIR/bin/java" -Xms64m -Xmx256m -XX:MaxMetaspaceSize=128m -XX:+UseSerialGC -jar "$UNIDBG_JAR" > "$UNIDBG_DIR/unidbg.log" 2>&1 &
            echo "unidbg PID: $!"
            disown
            
            # Wait for services to start (unidbg needs ~60-90s to initialize ARM emulation)
            echo "Waiting for services to start..."
            sleep 30
            
            # Verify deployment
            echo "--- Running containers ---"
            docker compose ps
            echo "--- Health check ---"
            curl -s -o /dev/null -w "Web reader HTTP %{http_code}\n" http://127.0.0.1:8199/ || echo "Web reader not ready"
            for i in 1 2 3 4 5 6 7 8; do
              UNIDBG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 http://127.0.0.1:8099/actuator/health 2>/dev/null || echo "000")
              echo "Unidbg health (attempt $i): $UNIDBG_STATUS"
              if [ "$UNIDBG_STATUS" = "200" ]; then break; fi
              sleep 15
            done
            
            # If unidbg still not ready, show log tail
            if [ "$UNIDBG_STATUS" != "200" ]; then
              echo "--- unidbg log tail ---"
              tail -20 "$UNIDBG_DIR/unidbg.log" 2>/dev/null || echo "no log"
            fi
            
            # Clean up
            docker image prune -f
            
            echo "Deployment completed successfully!"
