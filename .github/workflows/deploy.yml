name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /projects/fanqie-web-reader
            
            # Reset any local changes and pull latest code
            git fetch origin main
            git reset --hard origin/main
            echo "Current commit: $(git rev-parse --short HEAD)"
            
            # Free disk space aggressively (critical for 1C1G VPS)
            echo "=== Disk before cleanup ==="
            df -h /
            docker compose down --remove-orphans 2>/dev/null || true
            docker system prune -af --volumes
            echo "=== Disk after cleanup ==="
            df -h /
            
            # Build and start web reader
            echo "Building web reader..."
            docker compose build --no-cache fanqie-web-reader
            docker compose up -d fanqie-web-reader
            
            # --- Setup unidbg directly on host ---
            UNIDBG_DIR=/opt/unidbg
            UNIDBG_JAR="$UNIDBG_DIR/unidbg-boot-server.jar"
            PID_FILE="$UNIDBG_DIR/unidbg.pid"
            JAR_URL="https://github.com/mtongle/fqnovel-unidbg/releases/download/v0.0.4/unidbg-boot-server-0.0.4.jar"
            
            mkdir -p "$UNIDBG_DIR"
            
            # Ensure swap exists (unidbg needs native memory for ARM emulation)
            if ! swapon --show | grep -q /swapfile; then
              if [ ! -f /swapfile ]; then
                echo "Creating 1GB swap file..."
                fallocate -l 1G /swapfile 2>/dev/null || dd if=/dev/zero of=/swapfile bs=1M count=1024
                chmod 600 /swapfile
                mkswap /swapfile
              fi
              swapon /swapfile
              echo "Swap enabled"
            fi
            
            # Install JRE + required libs if not present
            if ! command -v java &>/dev/null; then
              echo "Installing default JRE (Debian 12)..."
              apt-get update -qq && apt-get install -y -qq default-jre-headless curl libstdc++6
            fi
            JAVA_BIN=$(which java)
            echo "Java version: $($JAVA_BIN -version 2>&1 | head -1)"
            
            # Download unidbg JAR if not present
            if [ ! -f "$UNIDBG_JAR" ]; then
              echo "Downloading unidbg JAR..."
              curl -fsSL -o "$UNIDBG_JAR" "$JAR_URL"
              echo "JAR size: $(ls -lh $UNIDBG_JAR | awk '{print $5}')"
            else
              echo "unidbg JAR exists ($(ls -lh $UNIDBG_JAR | awk '{print $5}'))"
            fi
            
            # Create minimal config: single worker, no async, small device pool
            cat > "$UNIDBG_DIR/application.yml" << 'EOF'
server:
  port: 8099
spring:
  redis:
    host: 0.0.0.0
application:
  unidbg:
    dynarmic: false
    verbose: false
    async: false
fq:
  api:
    base-url: https://api5-normal-sinfonlineb.fqnovel.com
    device-pool:
      enabled: true
      size: 1
EOF
            
            # Stop old unidbg process
            if [ -f "$PID_FILE" ]; then
              OLD_PID=$(cat "$PID_FILE")
              if [ -n "$OLD_PID" ] && kill -0 "$OLD_PID" 2>/dev/null; then
                echo "Stopping old unidbg PID: $OLD_PID"
                kill "$OLD_PID" 2>/dev/null || true
                sleep 3
              fi
              rm -f "$PID_FILE"
            fi
            
            # Stop Docker containers NOW to free memory before starting unidbg
            echo "Stopping Docker containers to free memory..."
            cd /projects/fanqie-web-reader
            docker compose down --remove-orphans 2>/dev/null || true
            docker system prune -f 2>/dev/null || true
            
            echo "--- Memory before starting unidbg ---"
            free -h
            
            # Clear old log and start unidbg (point to external config dir)
            echo "Starting unidbg..."
            cd "$UNIDBG_DIR"
            : > "$UNIDBG_DIR/unidbg.log"
            nohup "$JAVA_BIN" \
              -Xms64m -Xmx192m -XX:MaxMetaspaceSize=96m -XX:MaxDirectMemorySize=64m \
              -XX:+UseSerialGC -XX:ActiveProcessorCount=1 \
              -jar "$UNIDBG_JAR" \
              --spring.config.additional-location=file:$UNIDBG_DIR/ \
              > "$UNIDBG_DIR/unidbg.log" 2>&1 &
            UNIDBG_PID=$!
            echo $UNIDBG_PID > "$PID_FILE"
            echo "unidbg PID: $UNIDBG_PID"
            disown
            
            # Wait for unidbg to initialize (ARM emulation needs time)
            echo "Waiting for unidbg to start..."
            UNIDBG_READY=0
            for i in $(seq 1 20); do
              sleep 10
              if ! kill -0 "$UNIDBG_PID" 2>/dev/null; then
                echo "unidbg process died!"
                tail -30 "$UNIDBG_DIR/unidbg.log"
                break
              fi
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 http://127.0.0.1:8099/actuator/health 2>/dev/null || echo "000")
              echo "unidbg check $i: HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                UNIDBG_READY=1
                break
              fi
            done
            
            if [ "$UNIDBG_READY" != "1" ]; then
              echo "unidbg failed to start. Log:"
              tail -40 "$UNIDBG_DIR/unidbg.log"
            fi
            
            # Now build and start web reader
            cd /projects/fanqie-web-reader
            echo "=== Memory after unidbg started ==="
            free -h
            echo "Building web reader..."
            docker compose build --no-cache fanqie-web-reader
            docker compose up -d fanqie-web-reader
            
            # Wait for web reader to start
            sleep 10
            
            # Verify deployment
            echo "--- Running containers ---"
            docker compose ps
            echo "--- Health check ---"
            curl -s -o /dev/null -w "Web reader HTTP %{http_code}\n" http://127.0.0.1:8199/ || echo "Web reader not ready"
            UNIDBG_FINAL=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 http://127.0.0.1:8099/actuator/health 2>/dev/null || echo "000")
            echo "Unidbg final health: $UNIDBG_FINAL"
            if [ "$UNIDBG_FINAL" != "200" ]; then
              echo "--- unidbg log tail ---"
              tail -30 "$UNIDBG_DIR/unidbg.log"
            fi
            
            # Clean up
            docker image prune -f
            
            echo "Deployment completed successfully!"
