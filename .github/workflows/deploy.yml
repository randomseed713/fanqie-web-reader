name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /projects/fanqie-web-reader
            
            # Reset any local changes and pull latest code
            git fetch origin main
            git reset --hard origin/main
            echo "Current commit: $(git rev-parse --short HEAD)"
            
            # Stop existing containers
            docker compose down --remove-orphans
            
            # Rebuild services (web reader from local, unidbg downloads pre-built JAR)
            echo "Building services..."
            docker compose build --no-cache
            
            # Start all services
            docker compose up -d
            
            # Wait for unidbg to initialize (ARM emulation takes time)
            echo "Waiting for services to start..."
            sleep 45
            
            # Verify deployment
            echo "--- Running containers ---"
            docker compose ps
            echo "--- Health check ---"
            curl -s -o /dev/null -w "Web reader HTTP %{http_code}\n" http://127.0.0.1:8199/ || echo "Web reader not ready"
            for i in 1 2 3; do
              UNIDBG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 http://127.0.0.1:8099/actuator/health 2>/dev/null || echo "000")
              echo "Unidbg health (attempt $i): $UNIDBG_STATUS"
              if [ "$UNIDBG_STATUS" = "200" ]; then break; fi
              sleep 10
            done
            
            # Clean up old images
            docker image prune -f
            
            echo "Deployment completed successfully!"