name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /projects/fanqie-web-reader
            
            # Reset any local changes and pull latest code
            git fetch origin main
            git reset --hard origin/main
            echo "Current commit: $(git rev-parse --short HEAD)"
            
            # Pull pre-built images (unidbg is optional, don't fail if blocked)
            echo "Pulling unidbg image..."
            docker pull gxmandppx/unidbg-fq:latest 2>&1 | tail -3 || echo "WARNING: unidbg image pull failed, comment API will be unavailable"
            
            # Rebuild and restart main service (with unidbg profile if image exists)
            docker compose down --remove-orphans
            docker compose build --no-cache fanqie-web-reader
            
            # Start main service always
            docker compose up -d fanqie-web-reader
            
            # Try to start unidbg (profiles include it)
            UNIDBG_AVAILABLE=$(docker images -q gxmandppx/unidbg-fq:latest 2>/dev/null)
            if [ -n "$UNIDBG_AVAILABLE" ]; then
              echo "Starting unidbg..."
              docker compose --profile unidbg up -d unidbg
            else
              echo "Skipping unidbg (image not available)"
            fi
            
            # Wait for services to start
            sleep 8
            
            # Verify deployment
            echo "--- Running containers ---"
            docker compose ps
            echo "--- Health check ---"
            curl -s -o /dev/null -w "Web reader HTTP %{http_code}\n" http://127.0.0.1:8199/
            UNIDBG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 http://127.0.0.1:8099/health 2>/dev/null || echo "unreachable")
            echo "Unidbg health: $UNIDBG_STATUS"
            
            # Clean up old images
            docker image prune -f
            
            echo "Deployment completed successfully!"