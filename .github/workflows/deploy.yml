name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /projects/fanqie-web-reader
            
            # Reset any local changes and pull latest code
            git fetch origin main
            git reset --hard origin/main
            echo "Current commit: $(git rev-parse --short HEAD)"
            
            # Stop existing containers
            docker compose down --remove-orphans
            
            # Ensure enough swap for maven build (1GB)
            if [ ! -f /tmp/swapfile1g ]; then
              echo "Creating 1GB swap file for build..."
              fallocate -l 1G /tmp/swapfile1g 2>/dev/null || dd if=/dev/zero of=/tmp/swapfile1g bs=1M count=1024
              chmod 600 /tmp/swapfile1g
              mkswap /tmp/swapfile1g
            fi
            swapon /tmp/swapfile1g 2>/dev/null || true
            
            # Rebuild both services
            echo "Building services..."
            docker compose build --no-cache
            
            # Start all services
            docker compose up -d
            
            # Wait for services to start (unidbg needs time to initialize unidbg VM)
            echo "Waiting for services to start..."
            sleep 45
            
            # Verify deployment
            echo "--- Running containers ---"
            docker compose ps
            echo "--- Health check ---"
            curl -s -o /dev/null -w "Web reader HTTP %{http_code}\n" http://127.0.0.1:8199/ || echo "Web reader not ready"
            UNIDBG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 http://127.0.0.1:8099/actuator/health 2>/dev/null || echo "unreachable")
            echo "Unidbg health: $UNIDBG_STATUS"
            
            # Turn off swap after build
            swapoff /tmp/swapfile1g 2>/dev/null || true
            
            # Clean up old images
            docker image prune -f
            
            echo "Deployment completed successfully!"