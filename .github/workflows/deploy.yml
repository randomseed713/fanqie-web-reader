name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /projects/fanqie-web-reader
            
            # Reset any local changes and pull latest code
            git fetch origin main
            git reset --hard origin/main
            echo "Current commit: $(git rev-parse --short HEAD)"
            
            # Pull pre-built images (unidbg is optional, don't fail if blocked)
            docker compose pull unidbg 2>/dev/null || echo "unidbg image pull skipped (ghcr.io may be blocked)"
            
            # Start unidbg if available, ignore failure
            docker compose up -d unidbg 2>/dev/null || echo "unidbg not started (optional)"
            
            # Rebuild and restart main service
            docker compose down --remove-orphans
            docker compose build --no-cache fanqie-web-reader
            docker compose up -d fanqie-web-reader
            
            # Wait a moment for service to start
            sleep 5
            
            # Verify deployment
            echo "--- Running containers ---"
            docker compose ps
            echo "--- Health check ---"
            curl -s -o /dev/null -w "HTTP %{http_code}" http://127.0.0.1:8199/
            echo ""
            
            # Clean up old images
            docker image prune -f
            
            echo "Deployment completed successfully!"