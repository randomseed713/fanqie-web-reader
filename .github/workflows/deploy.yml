name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /projects/fanqie-web-reader
            
            # Reset any local changes and pull latest code
            git fetch origin main
            git reset --hard origin/main
            echo "Current commit: $(git rev-parse --short HEAD)"
            
            # ===== STEP 1: Aggressive cleanup to free disk & memory =====
            echo "=== Disk before cleanup ==="
            df -h /
            docker compose down --remove-orphans 2>/dev/null || true
            docker system prune -af --volumes
            # Also clean apt cache
            apt-get clean 2>/dev/null || true
            echo "=== Disk after cleanup ==="
            df -h /
            
            # ===== STEP 2: Ensure swap =====
            if ! swapon --show | grep -q /swapfile; then
              if [ ! -f /swapfile ]; then
                echo "Creating 1GB swap file..."
                fallocate -l 1G /swapfile 2>/dev/null || dd if=/dev/zero of=/swapfile bs=1M count=1024
                chmod 600 /swapfile
                mkswap /swapfile
              fi
              swapon /swapfile
              echo "Swap enabled"
            fi
            
            # ===== STEP 3: Install JRE if needed =====
            export DEBIAN_FRONTEND=noninteractive
            if ! command -v java &>/dev/null; then
              echo "Installing default JRE..."
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends default-jre-headless curl libstdc++6
            fi
            JAVA_BIN=$(which java)
            echo "Java: $($JAVA_BIN -version 2>&1 | head -1)"
            
            # ===== STEP 4: Setup unidbg directory =====
            UNIDBG_DIR=/opt/unidbg
            UNIDBG_JAR="$UNIDBG_DIR/unidbg-boot-server.jar"
            PID_FILE="$UNIDBG_DIR/unidbg.pid"
            JAR_URL="https://github.com/mtongle/fqnovel-unidbg/releases/download/v0.0.4/unidbg-boot-server-0.0.4.jar"
            mkdir -p "$UNIDBG_DIR"
            
            # Download JAR if needed
            if [ ! -f "$UNIDBG_JAR" ]; then
              echo "Downloading unidbg JAR..."
              curl -fL --retry 3 -o "$UNIDBG_JAR" "$JAR_URL"
              echo "JAR size: $(ls -lh $UNIDBG_JAR | awk '{print $5}')"
            else
              echo "unidbg JAR exists ($(ls -lh $UNIDBG_JAR | awk '{print $5}'))"
            fi
            
            # Write config (single worker, no async)
            printf 'server:\n  port: 8099\nspring:\n  redis:\n    host: 0.0.0.0\napplication:\n  unidbg:\n    dynarmic: false\n    verbose: false\n    async: false\nfq:\n  api:\n    base-url: https://api5-normal-sinfonlineb.fqnovel.com\n    device-pool:\n      enabled: true\n      size: 1\n' > "$UNIDBG_DIR/application.yml"
            echo "Config written"
            
            # Stop old unidbg
            if [ -f "$PID_FILE" ]; then
              OLD_PID=$(cat "$PID_FILE")
              if [ -n "$OLD_PID" ] && kill -0 "$OLD_PID" 2>/dev/null; then
                echo "Stopping old unidbg PID: $OLD_PID"
                kill "$OLD_PID" || true
                sleep 3
              fi
              rm -f "$PID_FILE"
            fi
            
            # ===== STEP 5: Start unidbg (Docker is down, max RAM available) =====
            echo "=== Memory before unidbg ==="
            free -h
            echo "Starting unidbg..."
            : > "$UNIDBG_DIR/unidbg.log"
            cd "$UNIDBG_DIR"
            setsid nohup "$JAVA_BIN" \
              -Xms64m -Xmx192m -XX:MaxMetaspaceSize=96m -XX:MaxDirectMemorySize=64m \
              -XX:+UseSerialGC -XX:ActiveProcessorCount=1 \
              -jar "$UNIDBG_JAR" \
              --spring.config.additional-location=file:"$UNIDBG_DIR"/ \
              > "$UNIDBG_DIR/unidbg.log" 2>&1 < /dev/null &
            UNIDBG_PID=$!
            echo $UNIDBG_PID > "$PID_FILE"
            echo "unidbg PID: $UNIDBG_PID"
            disown || true
            
            # Wait for unidbg: poll /api/fq-signature/test (port 8099)
            echo "Waiting for unidbg to initialize ARM emulator..."
            UNIDBG_READY=0
            for i in $(seq 1 24); do
              sleep 10
              if ! kill -0 "$UNIDBG_PID" 2>/dev/null; then
                echo "!!! unidbg process died !!!"
                tail -40 "$UNIDBG_DIR/unidbg.log"
                break
              fi
              # Check if port 8099 responds (any non-connection-refused means Tomcat is up)
              CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 http://127.0.0.1:8099/api/fq-signature/test 2>/dev/null || echo "000")
              echo "unidbg check $i: HTTP $CODE"
              if [ "$CODE" != "000" ] && [ "$CODE" != "502" ] && [ "$CODE" != "503" ]; then
                UNIDBG_READY=1
                break
              fi
            done
            
            if [ "$UNIDBG_READY" != "1" ]; then
              echo "!!! unidbg did not become ready in time !!!"
              echo "--- Log ---"
              tail -50 "$UNIDBG_DIR/unidbg.log"
              echo "--- Memory ---"
              free -h
            else
              echo "unidbg is READY!"
            fi
            
            # ===== STEP 6: Build & start web reader =====
            cd /projects/fanqie-web-reader
            echo "=== Disk before docker build ==="
            df -h /
            # Prune docker again to free any build cache from previous runs
            docker system prune -f 2>/dev/null || true
            
            echo "Building web reader..."
            docker compose build --no-cache fanqie-web-reader
            docker compose up -d fanqie-web-reader
            
            # Wait for web reader
            sleep 8
            
            # ===== STEP 7: Verify =====
            echo "=== Final status ==="
            docker compose ps
            echo "--- Health checks ---"
            curl -s -o /dev/null -w "Web reader HTTP %{http_code}\n" http://127.0.0.1:8199/ || echo "Web reader not ready"
            UNIDBG_FINAL=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 http://127.0.0.1:8099/api/fq-signature/test 2>/dev/null || echo "000")
            echo "Unidbg HTTP $UNIDBG_FINAL"
            
            echo "=== Memory ==="
            free -h
            echo "=== Disk ==="
            df -h /
            
            docker image prune -f
            echo "Deployment completed successfully!"
