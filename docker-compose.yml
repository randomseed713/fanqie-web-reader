services:
  fanqie-web-reader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fanqie-web-reader
    ports:
      - "127.0.0.1:8199:8199"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8199/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s