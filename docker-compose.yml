services:
  fanqie-web-reader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fanqie-web-reader
    ports:
      - "127.0.0.1:8199:8199"
    environment:
      - PARA_COMMENT_MOCK=false
      - UNIDBG_API=http://unidbg:8099
    depends_on:
      - unidbg
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8199/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  unidbg:
    build:
      context: ./unidbg
      dockerfile: Dockerfile
    container_name: fanqie-unidbg
    ports:
      - "127.0.0.1:8099:8099"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8099/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
