services:
  redis:
    image: redis:7-alpine
    container_name: fanqie-redis
    network_mode: host
    command: >
      redis-server
      --bind 127.0.0.1
      --port 6379
      --requirepass fanqie_unidbg_2026
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    restart: unless-stopped

  fanqie-web-reader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fanqie-web-reader
    network_mode: host
    environment:
      - PARA_COMMENT_MOCK=false
      - UNIDBG_API=http://127.0.0.1:8099
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8199/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
